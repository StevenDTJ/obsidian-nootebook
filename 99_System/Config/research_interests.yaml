# 排除关键词
excluded_keywords: []

# 搜索配置
search:
  days: 90
  max_results: 100
  top_n: 10
  sources:
    - pubmed
    - s2

# 评分权重
weights:
  relevance: 0.45
  recency: 0.25
  popularity: 0.20
  quality: 0.10
